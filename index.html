<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>إنجاد - نسخة عرض</title>

<style>
body{margin:0;font-family:Tahoma;background:#f5f7fb}
.login{display:flex;height:100vh}
.box{margin:auto;background:#fff;padding:30px;border-radius:15px;width:320px;text-align:center}
button{padding:10px;border:0;background:#dc2626;color:#fff;border-radius:8px;width:100%;cursor:pointer}
.app{display:none}
.top{background:#111;color:#fff;padding:15px}
.content{padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
</style>
</head>

<body>

<div id="login" class="login">
  <div class="box">
    <h2>تسجيل الدخول</h2>
    <select id="user" style="width:100%;padding:10px;margin:10px 0"></select>
    <input id="pin" value="1234" style="width:100%;padding:10px;margin-bottom:10px">
    <button onclick="login()">دخول</button>
  </div>
</div>

<div id="app" class="app">
  <div class="top">
    <span id="name"></span>
    <button onclick="logout()" style="float:left;background:#444">خروج</button>
  </div>

  <div class="content">
    <div class="card">
      <h3>الرئيسية</h3>
      <p>عدد المباشرات: <b id="count"></b></p>
    </div>

    <div class="card">
      <h3>إضافة حالة</h3>
      <input id="case" placeholder="نوع الحالة" style="width:100%;padding:10px">
      <button onclick="add()">حفظ</button>
    </div>

    <div class="card">
      <h3>السجل</h3>
      <div id="list"></div>
    </div>
  </div>
</div>

<script>
const users=[
{name:"فيصل",role:"مسعف"},
{name:"علي",role:"مشرف"},
{name:"مدير",role:"مدير"}
];

let data=JSON.parse(localStorage.getItem("cases")||"[]");
let current=null;

function init(){
  document.getElementById("user").innerHTML=
    users.map((u,i)=>`<option value="${i}">${u.name} - ${u.role}</option>`).join("");
}
init();

function login(){
  if(document.getElementById("pin").value!=="1234") return alert("خطأ");
  current=users[document.getElementById("user").value];
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("name").innerText=current.name;
  render();
}

function logout(){location.reload()}

function add(){
  const val=document.getElementById("case").value;
  if(!val) return;
  data.push({text:val,user:current.name});
  localStorage.setItem("cases",JSON.stringify(data));
  document.getElementById("case").value="";
  render();
}

function render(){
  document.getElementById("count").innerText=data.length;
  document.getElementById("list").innerHTML=
    data.map(i=>`<div>- ${i.text} (${i.user})</div>`).join("");
}
</script>

</body>
</html>
